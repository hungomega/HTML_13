<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/reset.css" />

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <title>Layout</title>
        <link rel="stylesheet" href="./css/style3.css" />
    </head>

    <body>
        <div class="wrapper">
            <div class="header">
                <div class="logo-box">
                    <img
                        src="https://files.fullstack.edu.vn/f8-prod/organization-logos/694743c405102.png"
                        alt="Image"
                        class="logo"
                    />
                    <h1 class="slogan">Hoc lập trình để đi làm</h1>
                </div>

                <!-- search -->
                <form action="" class="form-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input
                        type="text"
                        class="search-input"
                        placeholder="Tìm kiếm..."
                    />
                </form>

                <!-- user action -->
                <div class="user-actions">
                    <button class="btn btn-register">Đăng ký</button>
                    <button class="btn btn-login">Đăng nhập</button>
                </div>
            </div>
        </div>
    </body>
</html>
